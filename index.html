<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>☄ DOOMSDAY Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
// WebGPU only exists in secure contexts — force HTTPS everywhere except local dev.
if (location.protocol === 'http:' && !['localhost', '127.0.0.1'].includes(location.hostname)) {
  location.replace('https://' + location.host + location.pathname + location.search);
}
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="gpu-canvas"></canvas>
<div id="ui-root"></div>
<div id="boot-overlay">
  <div class="boot-title">☄ DOOMSDAY SIMULATOR</div>
  <div class="boot-sub" id="boot-status">initializing…</div>
</div>
<div id="error-overlay"><div class="err-msg"></div></div>
<script type="module" src="js/main.js"></script>
</body>
</html>
